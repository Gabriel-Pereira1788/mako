name: Build Android

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-build.yml'
      - 'mako-react-native/example/android/**'
      - 'mako-react-native/nitrogen/generated/shared/**'
      - 'mako-react-native/nitrogen/generated/android/**'
      - 'mako-react-native/cpp/**'
      - 'mako-react-native/android/**'
      - 'mako-react-native/**/bun.lock'
      - 'mako-react-native/**/react-native.config.js'
      - 'mako-react-native/**/nitro.json'
  pull_request:
    paths:
      - '.github/workflows/android-build.yml'
      - 'mako-react-native/example/android/**'
      - 'mako-react-native/**/nitrogen/generated/shared/**'
      - 'mako-react-native/**/nitrogen/generated/android/**'
      - 'mako-react-native/cpp/**'
      - 'mako-react-native/android/**'
      - 'mako-react-native/**/bun.lock'
      - 'mako-react-native/**/react-native.config.js'
      - 'mako-react-native/**/nitro.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Example App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mako-react-native
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies (bun)
        run: bun install

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mako-react-native/example/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Gradle build
        working-directory: mako-react-native/example/android
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Stop Gradle daemon
        working-directory: mako-react-native/example/android
        run: ./gradlew --stop
