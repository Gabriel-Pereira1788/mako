name: Release MakoApp

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build DMG and Create Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build MakoApp
        working-directory: MakoApp
        run: |
          xcodebuild -scheme Mako \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Mako" \
            --volicon "assets/launch_icon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Mako.app" 150 190 \
            --app-drop-link 450 190 \
            "Mako-${{ inputs.version }}.dmg" \
            "MakoApp/build/Build/Products/Release/Mako.app"

      - name: Create Release with Auto Notes
        uses: softprops/action-gh-release@v2
        with:
          name: "MakoApp v${{ inputs.version }}"
          tag_name: "makoapp-v${{ inputs.version }}"
          generate_release_notes: true
          files: Mako-*.dmg
          draft: false
          prerelease: false
