name: Release MakoApp

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build DMG and Create Release
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: MakoApp
        run: npm install

      - name: Get next version (dry-run)
        id: version
        working-directory: MakoApp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx semantic-release --dry-run 2>&1) || true
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | grep -E "The next release version is" | sed -E 's/.*The next release version is ([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || echo "")
          if [ -z "$VERSION" ]; then
            echo "No new version to release. Check if there are commits following Conventional Commits format."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build MakoApp
        working-directory: MakoApp
        run: |
          xcodebuild -scheme Mako \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="MakoApp/build/Build/Products/Release/Mako.app"

          echo "Step 1: Verifying app exists"
          ls -la "$APP_PATH" || { echo "ERROR: App not found"; exit 1; }

          echo "Step 2: Verifying code signature"
          codesign -vvv --deep --strict "$APP_PATH" 2>&1 || { echo "ERROR: Signature invalid"; exit 1; }

          echo "Step 3: Creating zip"
          ditto -c -k --keepParent "$APP_PATH" Mako-notarize.zip
          ls -la Mako-notarize.zip

          echo "Step 4: Submitting to notarization"
          xcrun notarytool submit Mako-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee notarization-output.txt
          NOTARY_EXIT_CODE=${PIPESTATUS[0]}

          echo "Step 5: Notarization exit code: $NOTARY_EXIT_CODE"
          echo "Step 6: Notarization output:"
          cat notarization-output.txt

          if [ $NOTARY_EXIT_CODE -ne 0 ]; then
            echo "ERROR: Notarization command failed"
            exit 1
          fi

          if grep -q "status: Accepted" notarization-output.txt; then
            echo "Step 7: Notarization successful!"
          else
            echo "ERROR: Notarization not accepted"
            SUBMISSION_ID=$(grep "id:" notarization-output.txt | head -1 | awk '{print $2}')
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for: $SUBMISSION_ID"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1 || true
            fi
            exit 1
          fi

          echo "Step 8: Stapling"
          xcrun stapler staple "$APP_PATH"
          echo "Done!"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Mako" \
            --volicon "assets/launch_icon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Mako.app" 150 190 \
            --app-drop-link 450 190 \
            "Mako-${{ steps.version.outputs.version }}.dmg" \
            "MakoApp/build/Build/Products/Release/Mako.app"

      - name: Release (creates tag, GitHub release, and uploads DMG)
        working-directory: MakoApp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
